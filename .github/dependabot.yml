version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-dependencies:
        patterns:
          - "*" # Include all dependencies in one PR
        update-types:
          - "minor"
          - "patch"

    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
  - package-ecosystem: gomod
    directories: [".", "./.sage", "./cmd/saga"]
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns:
          - "*" # Include all dependencies in one PR
        update-types:
          - "minor"
          - "patch"

    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
